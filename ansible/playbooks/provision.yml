---
- name: Provision single-node K3s VPS host
  hosts: k3s_servers
  become: true
  gather_facts: true

  pre_tasks:
    - name: Set effective Tailscale private access flags
      ansible.builtin.set_fact:
        tailscale_private_ssh_effective: "{{ tailscale_private_ssh_enabled | default(tailscale_private_admin_enabled | default(false)) | bool }}"
        tailscale_private_k3s_api_effective: "{{ tailscale_private_k3s_api_enabled | default(tailscale_private_admin_enabled | default(false)) | bool }}"

  roles:
    - role: common
    - role: ssh_hardening
      when: ssh_hardening_enabled | default(true) | bool
    - role: tailscale
      when: tailscale_enabled | default(false) | bool
    - role: k3s_server
    - role: cert_manager
      when: cert_manager_enabled | bool
    - role: cloudflare_dns01
      when:
        - cert_manager_enabled | bool
        - acme_dns_provider == 'cloudflare'
    - role: openclaw
      when: openclaw_enabled | bool
    - role: cloudflare_origin_lockdown
      when: cloudflare_origin_lockdown_enabled | bool
    - role: tailscale_admin_lockdown
      when: tailscale_private_ssh_effective or tailscale_private_k3s_api_effective
