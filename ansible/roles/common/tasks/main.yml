---
- name: Assert SELinux is enforcing
  ansible.builtin.assert:
    that:
      - ansible_facts.selinux is defined
      - ansible_facts.selinux.status == 'enabled'
      - ansible_facts.selinux.mode == 'enforcing'
    fail_msg: This role expects SELinux to remain enabled and enforcing

- name: Install base operating system packages
  ansible.builtin.package:
    name: "{{ base_packages }}"
    state: present

- name: Enable and start chronyd
  ansible.builtin.service:
    name: chronyd
    enabled: true
    state: started

- name: Enable and start firewalld
  ansible.builtin.service:
    name: firewalld
    enabled: true
    state: started

- name: Persist required kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s.conf
    mode: "0644"
    content: |
      overlay
      br_netfilter

- name: Load required kernel modules immediately
  ansible.builtin.command: "modprobe {{ item }}"
  loop:
    - overlay
    - br_netfilter
  changed_when: false

- name: Configure Kubernetes sysctl values
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { name: net.bridge.bridge-nf-call-iptables, value: "1" }
    - { name: net.bridge.bridge-nf-call-ip6tables, value: "1" }
    - { name: net.ipv4.ip_forward, value: "1" }

- name: Disable swap immediately when present
  ansible.builtin.command: swapoff -a
  when: ansible_facts.swaptotal_mb | int > 0
  changed_when: true

- name: Comment out swap entries in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(?!#)(.*\sswap\s.*)$'
    replace: '# disabled-by-ansible \1'

- name: Ensure SSH port remains open
  ansible.posix.firewalld:
    port: "{{ ssh_port }}/tcp"
    state: enabled
    permanent: true
    immediate: true
  when: not tailscale_private_ssh_effective | default(false) | bool
