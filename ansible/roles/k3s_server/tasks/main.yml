---
- name: Set effective K3s API endpoint and TLS SANs
  ansible.builtin.set_fact:
    k3s_server_effective_api_host: >-
      {{
        tailscale_k3s_api_host
        if (
          tailscale_enabled | default(false) | bool
          and tailscale_private_k3s_api_effective | default(false) | bool
          and (tailscale_k3s_api_host | default('') | length > 0)
        )
        else (
          tailscale_ipv4
          if (
            tailscale_enabled | default(false) | bool
            and tailscale_private_k3s_api_effective | default(false) | bool
            and (tailscale_ipv4 | default('') | length > 0)
          )
          else k3s_api_host
        )
      }}
    k3s_server_effective_tls_sans: >-
      {{
        (
          k3s_tls_sans
          + (
            [tailscale_k3s_api_host]
            if (
              tailscale_enabled | default(false) | bool
              and tailscale_private_k3s_api_effective | default(false) | bool
              and (tailscale_k3s_api_host | default('') | length > 0)
            )
            else []
          )
          + (
            [tailscale_ipv4]
            if (
              tailscale_enabled | default(false) | bool
              and tailscale_private_k3s_api_effective | default(false) | bool
              and (tailscale_k3s_api_host | default('') | length == 0)
              and (tailscale_ipv4 | default('') | length > 0)
            )
            else []
          )
        ) | unique
      }}

- name: Create K3s config directory
  ansible.builtin.file:
    path: "{{ k3s_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create K3s manifests directory
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render K3s server config
  ansible.builtin.template:
    src: k3s-config.yaml.j2
    dest: "{{ k3s_config_file }}"
    owner: root
    group: root
    mode: "0600"
  notify: Restart K3s

- name: Fetch Cloudflare IPv4 ranges for Traefik trusted proxies
  ansible.builtin.uri:
    url: "{{ cloudflare_ips_v4_url }}"
    return_content: true
  register: k3s_server_cloudflare_ips_v4
  changed_when: false
  when: cloudflare_access_enabled | bool

- name: Fetch Cloudflare IPv6 ranges for Traefik trusted proxies
  ansible.builtin.uri:
    url: "{{ cloudflare_ips_v6_url }}"
    return_content: true
  register: k3s_server_cloudflare_ips_v6
  changed_when: false
  when: cloudflare_access_enabled | bool

- name: Parse Cloudflare IP ranges for Traefik trusted proxies
  ansible.builtin.set_fact:
    k3s_server_cloudflare_ipv4_ranges: >-
      {{
        k3s_server_cloudflare_ips_v4.content.splitlines()
        | map('trim')
        | reject('equalto', '')
        | reject('match', '^#')
        | list
      }}
    k3s_server_cloudflare_ipv6_ranges: >-
      {{
        k3s_server_cloudflare_ips_v6.content.splitlines()
        | map('trim')
        | reject('equalto', '')
        | reject('match', '^#')
        | list
      }}
  when: cloudflare_access_enabled | bool

- name: Assert Cloudflare IP ranges were fetched for Traefik trusted proxies
  ansible.builtin.assert:
    that:
      - k3s_server_cloudflare_ipv4_ranges | length > 0
      - k3s_server_cloudflare_ipv6_ranges | length > 0
    fail_msg: Failed to fetch Cloudflare IP ranges for Traefik trusted proxies
  when: cloudflare_access_enabled | bool

- name: Render Traefik HelmChartConfig
  ansible.builtin.template:
    src: traefik-helmchartconfig.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
    owner: root
    group: root
    mode: "0644"

- name: Open K3s API firewall port
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    state: enabled
    permanent: true
    immediate: true
  loop:
    - "6443"
  when: not tailscale_private_k3s_api_effective | default(false) | bool

- name: Open public HTTP and HTTPS firewall ports when origin lockdown is disabled
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    state: enabled
    permanent: true
    immediate: true
  loop:
    - "80"
    - "443"
  when: not cloudflare_origin_lockdown_enabled | bool

- name: Trust pod and service CIDRs
  ansible.posix.firewalld:
    zone: trusted
    source: "{{ item }}"
    state: enabled
    permanent: true
    immediate: true
  loop:
    - "{{ pod_cidr }}"
    - "{{ service_cidr }}"

- name: Ensure local source directory exists
  ansible.builtin.file:
    path: /usr/local/src
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download K3s installer
  ansible.builtin.get_url:
    url: "{{ k3s_install_script_url }}"
    dest: /usr/local/src/k3s-install.sh
    mode: "0755"

- name: Check installed K3s binary
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_server_binary

- name: Read installed K3s version
  ansible.builtin.command: /usr/local/bin/k3s --version
  when: k3s_server_binary.stat.exists
  changed_when: false
  failed_when: false
  register: k3s_server_version_check

- name: Extract installed K3s version
  ansible.builtin.set_fact:
    k3s_server_installed_version: >-
      {{ k3s_server_version_check.stdout | regex_search('v[^\\s]+') | default('') }}

- name: Install or upgrade K3s server
  ansible.builtin.command: /usr/local/src/k3s-install.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: server
  when: not k3s_server_binary.stat.exists or k3s_server_installed_version != k3s_version
  changed_when: true

- name: Ensure k3s service is enabled and started
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
    daemon_reload: true

- name: Flush handlers before health checks
  ansible.builtin.meta: flush_handlers

- name: Wait for kubeconfig to be written
  ansible.builtin.wait_for:
    path: "{{ k3s_kubeconfig_path }}"
    timeout: 120

- name: Wait for K3s API readiness
  ansible.builtin.command: /usr/local/bin/kubectl get --raw=/readyz
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
    K3S_CONFIG_FILE: /dev/null
  register: k3s_server_readyz
  retries: 60
  delay: 5
  until: k3s_server_readyz.rc == 0
  changed_when: false

- name: Apply Traefik HelmChartConfig
  ansible.builtin.command: >-
    /usr/local/bin/kubectl apply
    -f /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
    K3S_CONFIG_FILE: /dev/null
  changed_when: false

- name: Wait for the node to be Ready
  ansible.builtin.command: >-
    /usr/local/bin/kubectl wait
    --for=condition=Ready
    node/{{ k3s_node_name }}
    --timeout=300s
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
    K3S_CONFIG_FILE: /dev/null
  changed_when: false

- name: Read passwd entry for admin user
  ansible.builtin.getent:
    database: passwd
    key: "{{ admin_user }}"

- name: Capture admin home directory
  ansible.builtin.set_fact:
    k3s_server_admin_home: "{{ ansible_facts.getent_passwd[admin_user][4] }}"

- name: Read root kubeconfig
  ansible.builtin.slurp:
    path: "{{ k3s_kubeconfig_path }}"
  register: k3s_server_root_kubeconfig

- name: Ensure admin kubeconfig directory exists
  ansible.builtin.file:
    path: "{{ k3s_server_admin_home }}/.kube"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0700"

- name: Write admin kubeconfig with effective API endpoint
  ansible.builtin.copy:
    dest: "{{ k3s_server_admin_home }}/.kube/config"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0600"
    content: >-
      {{
        (k3s_server_root_kubeconfig.content | b64decode)
        | replace('https://127.0.0.1:6443', 'https://' ~ k3s_server_effective_api_host ~ ':6443')
      }}
