---
- name: Assert OpenClaw gateway token is configured
  ansible.builtin.assert:
    that:
      - vault_openclaw_gateway_token is defined
      - vault_openclaw_gateway_token | length > 0
      - vault_openclaw_gateway_token != 'CHANGE_ME'
    fail_msg: >-
      OpenClaw provisioning requires vault_openclaw_gateway_token in
      inventories/personal/group_vars/all/vault.yml encrypted with ansible-vault.

- name: Assert OpenClaw TLS mode is supported
  ansible.builtin.assert:
    that:
      - openclaw_tls_mode in ['letsencrypt', 'cloudflare_origin_ca']
    fail_msg: openclaw_tls_mode must be either letsencrypt or cloudflare_origin_ca

- name: Check local OpenClaw Origin CA certificate file
  ansible.builtin.stat:
    path: "{{ openclaw_origin_ca_certificate_path }}"
  register: openclaw_origin_ca_certificate_file
  delegate_to: localhost
  become: false
  when: openclaw_tls_mode == 'cloudflare_origin_ca'

- name: Check local OpenClaw Origin CA private key file
  ansible.builtin.stat:
    path: "{{ openclaw_origin_ca_private_key_path }}"
  register: openclaw_origin_ca_private_key_file
  delegate_to: localhost
  become: false
  when: openclaw_tls_mode == 'cloudflare_origin_ca'

- name: Assert OpenClaw Origin CA PEM files exist locally
  ansible.builtin.assert:
    that:
      - openclaw_origin_ca_certificate_file.stat.exists
      - openclaw_origin_ca_private_key_file.stat.exists
    fail_msg: >-
      openclaw_tls_mode=cloudflare_origin_ca requires local PEM files at
      openclaw_origin_ca_certificate_path and openclaw_origin_ca_private_key_path.
  when: openclaw_tls_mode == 'cloudflare_origin_ca'

- name: Check for existing cert-manager OpenClaw certificate
  ansible.builtin.command: >-
    /usr/local/bin/kubectl -n {{ openclaw_namespace }} get
    certificate/{{ openclaw_tls_secret_name }}
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
    K3S_CONFIG_FILE: /dev/null
  changed_when: false
  failed_when: false
  register: openclaw_existing_certificate
  when: openclaw_tls_mode == 'cloudflare_origin_ca'

- name: Read existing OpenClaw TLS secret issuer
  ansible.builtin.shell: >-
    /usr/local/bin/kubectl -n {{ openclaw_namespace }} get secret {{ openclaw_tls_secret_name }}
    -o jsonpath='{.data.tls\.crt}'
    | base64 -d
    | openssl x509 -noout -issuer
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
    K3S_CONFIG_FILE: /dev/null
  changed_when: false
  failed_when: false
  register: openclaw_existing_tls_secret_issuer
  when: openclaw_tls_mode == 'cloudflare_origin_ca'

- name: Determine whether OpenClaw TLS needs a Cloudflare Origin CA migration
  ansible.builtin.set_fact:
    openclaw_tls_migration_needed: >-
      {{
        (openclaw_existing_certificate.rc == 0)
        or (openclaw_existing_tls_secret_issuer.rc != 0)
        or ('cloudflare' not in (openclaw_existing_tls_secret_issuer.stdout | lower))
        or ('origin' not in (openclaw_existing_tls_secret_issuer.stdout | lower))
      }}
  when: openclaw_tls_mode == 'cloudflare_origin_ca'

- name: Remove cert-manager OpenClaw certificate when migrating to Cloudflare Origin CA
  ansible.builtin.command: >-
    /usr/local/bin/kubectl -n {{ openclaw_namespace }} delete
    certificate/{{ openclaw_tls_secret_name }}
    --ignore-not-found=true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
    K3S_CONFIG_FILE: /dev/null
  register: openclaw_certificate_delete
  changed_when: "'deleted' in openclaw_certificate_delete.stdout"
  when:
    - openclaw_tls_mode == 'cloudflare_origin_ca'
    - openclaw_tls_migration_needed | bool

- name: Remove existing OpenClaw TLS secret before switching to Cloudflare Origin CA
  ansible.builtin.command: >-
    /usr/local/bin/kubectl -n {{ openclaw_namespace }} delete
    secret/{{ openclaw_tls_secret_name }}
    --ignore-not-found=true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
    K3S_CONFIG_FILE: /dev/null
  register: openclaw_tls_secret_delete
  changed_when: "'deleted' in openclaw_tls_secret_delete.stdout"
  when:
    - openclaw_tls_mode == 'cloudflare_origin_ca'
    - openclaw_tls_migration_needed | bool

- name: Fetch Cloudflare IPv4 ranges for OpenClaw ingress allowlist
  ansible.builtin.uri:
    url: "{{ cloudflare_ips_v4_url }}"
    return_content: true
  register: openclaw_cloudflare_ips_v4
  changed_when: false
  when: cloudflare_access_enabled | bool

- name: Fetch Cloudflare IPv6 ranges for OpenClaw ingress allowlist
  ansible.builtin.uri:
    url: "{{ cloudflare_ips_v6_url }}"
    return_content: true
  register: openclaw_cloudflare_ips_v6
  changed_when: false
  when: cloudflare_access_enabled | bool

- name: Parse Cloudflare IP ranges for OpenClaw ingress allowlist
  ansible.builtin.set_fact:
    openclaw_cloudflare_ipv4_ranges: >-
      {{
        openclaw_cloudflare_ips_v4.content.splitlines()
        | map('trim')
        | reject('equalto', '')
        | reject('match', '^#')
        | list
      }}
    openclaw_cloudflare_ipv6_ranges: >-
      {{
        openclaw_cloudflare_ips_v6.content.splitlines()
        | map('trim')
        | reject('equalto', '')
        | reject('match', '^#')
        | list
      }}
  when: cloudflare_access_enabled | bool

- name: Assert Cloudflare IP ranges were fetched for OpenClaw ingress allowlist
  ansible.builtin.assert:
    that:
      - openclaw_cloudflare_ipv4_ranges | length > 0
      - openclaw_cloudflare_ipv6_ranges | length > 0
    fail_msg: Failed to fetch Cloudflare IP ranges for the OpenClaw ingress allowlist
  when: cloudflare_access_enabled | bool

- name: Render OpenClaw manifest bundle
  ansible.builtin.template:
    src: openclaw-manifests.yaml.j2
    dest: /tmp/openclaw-manifests.yaml
    mode: "0600"

- name: Apply OpenClaw manifest bundle
  ansible.builtin.command: /usr/local/bin/kubectl apply -f /tmp/openclaw-manifests.yaml
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
    K3S_CONFIG_FILE: /dev/null
  register: openclaw_apply_result
  changed_when: >-
    'configured' in openclaw_apply_result.stdout
    or 'created' in openclaw_apply_result.stdout

- name: Restart OpenClaw deployment when config changes
  ansible.builtin.command: >-
    /usr/local/bin/kubectl -n {{ openclaw_namespace }} rollout restart
    deployment/openclaw
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
    K3S_CONFIG_FILE: /dev/null
  changed_when: true
  when: openclaw_apply_result is changed

- name: Wait for OpenClaw deployment rollout
  ansible.builtin.command: >-
    /usr/local/bin/kubectl -n {{ openclaw_namespace }} rollout status
    deployment/openclaw
    --timeout=900s
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
    K3S_CONFIG_FILE: /dev/null
  changed_when: false
