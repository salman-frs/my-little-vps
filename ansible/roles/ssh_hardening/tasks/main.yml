---
- name: Install Fail2ban packages when enabled
  ansible.builtin.package:
    name:
      - fail2ban
      - fail2ban-firewalld
    state: present
  when: fail2ban_enabled | bool

- name: Remove legacy SSH hardening drop-in
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d/99-my-little-vps.conf
    state: absent
  notify: Restart sshd

- name: Apply SSH hardening block at the end of sshd_config
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} ANSIBLE MANAGED BLOCK my-little-vps ssh hardening"
    block: |
      PermitRootLogin {{ ssh_root_login }}
      PasswordAuthentication {{ ssh_password_auth_enabled | bool | ternary('yes', 'no') }}
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      PubkeyAuthentication yes
      AuthenticationMethods publickey
      PermitEmptyPasswords no
      UsePAM yes
      MaxAuthTries {{ ssh_max_auth_tries }}
      MaxSessions {{ ssh_max_sessions }}
      MaxStartups {{ ssh_max_startups }}
      AllowUsers {{ ssh_allowed_users | join(' ') }}
    owner: root
    group: root
    mode: "0600"
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart sshd

- name: Render Fail2ban sshd jail configuration
  ansible.builtin.template:
    src: fail2ban-sshd.local.j2
    dest: /etc/fail2ban/jail.d/sshd.local
    owner: root
    group: root
    mode: "0644"
  when: fail2ban_enabled | bool
  notify: Restart fail2ban

- name: Ensure fail2ban service is enabled and started
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  when: fail2ban_enabled | bool
